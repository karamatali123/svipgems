<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">SVIPGEMS Game App Preview</title>
  <desc id="desc">Illustration of SVIPGEMS Android gaming app with gold gems and mobile interface</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="680" cy="80" r="120" fill="#6366f1" opacity="0.15"/>
  <circle cx="120" cy="380" r="90" fill="#f59e0b" opacity="0.12"/>
  <!-- Phone frame -->
  <rect x="280" y="40" width="240" height="370" rx="28" fill="#111827" stroke="#374151" stroke-width="4"/>
  <rect x="295" y="70" width="210" height="310" rx="8" fill="url(#screen)"/>
  <!-- App header -->
  <rect x="295" y="70" width="210" height="48" rx="8" fill="#4338ca"/>
  <text x="400" y="100" text-anchor="middle" fill="#fbbf24" font-family="Arial,sans-serif" font-size="16" font-weight="bold">SVIPGEMS</text>
  <!-- Game tiles -->
  <rect x="310" y="130" width="85" height="70" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="352" y="170" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Fortune</text>
  <text x="352" y="185" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Tiger</text>
  <rect x="410" y="130" width="85" height="70" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="452" y="170" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Dragon</text>
  <text x="452" y="185" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Tiger</text>
  <rect x="310" y="215" width="85" height="70" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="352" y="255" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Teen</text>
  <text x="352" y="270" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Patti</text>
  <rect x="410" y="215" width="85" height="70" rx="8" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="452" y="255" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Color</text>
  <text x="452" y="270" text-anchor="middle" fill="#e9d5ff" font-family="Arial,sans-serif" font-size="11">Predict</text>
  <!-- Wallet bar -->
  <rect x="310" y="300" width="180" height="36" rx="18" fill="url(#gold)"/>
  <text x="400" y="323" text-anchor="middle" fill="#1e1b4b" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Easypaisa · JazzCash</text>
  <!-- Gems decoration -->
  <polygon points="150,120 170,80 190,120 170,160" fill="url(#gold)" opacity="0.9"/>
  <polygon points="620,300 645,250 670,300 645,350" fill="url(#gold)" opacity="0.7"/>
  <polygon points="90,200 105,175 120,200 105,225" fill="#a78bfa" opacity="0.8"/>
  <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="14">SVIP Gems  Android APK Pakistan 2026</text>
</svg>
